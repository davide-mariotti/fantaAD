<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a051b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    
    <title>🏆 Fanta Adiacent - Pokedex delle Creature Aziendali</title>
    <meta name="description" content="Il pokedex aziendale per catturare, votare e collezionare le figure mitologiche di Adiacent." />
    
    <!-- Google Fonts: Outfit (modern, tech, premium) and Inter (highly legible text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Web App Manifest for PWA installation -->
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
    <script>
      // Service worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registrato con successo!', reg.scope))
            .catch(err => console.log('Errore registrazione Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
